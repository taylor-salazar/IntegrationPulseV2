specVersion: "3.0"
metadata:
  name: integration.pulse
type: application
# Local-only server config for UI work when the Fiori destination proxy is not
# configured on the machine. It serves the UI5 framework and webapp without
# registering the /api backend proxy from ui5.yaml.
framework:
  name: OpenUI5
  version: "1.120.20"
  libraries:
    - name: sap.f
    - name: sap.m
    - name: sap.tnt
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: themelib_sap_horizon
